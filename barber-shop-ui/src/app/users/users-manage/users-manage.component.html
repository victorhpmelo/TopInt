<div class="toolbar">
  <a mat-flat-button color="primary" routerLink="/users/new">Novo usuário</a>
</div>

@if (loadError) {
  <div class="error">{{ loadError }}</div>
}

<table mat-table [dataSource]="users" class="mat-elevation-z1 full">

  <ng-container matColumnDef="username">
    <th mat-header-cell *matHeaderCellDef>Usuário</th>
    <td mat-cell *matCellDef="let row">{{ row.username }}</td>
  </ng-container>

  <ng-container matColumnDef="fullName">
    <th mat-header-cell *matHeaderCellDef>Nome</th>
    <td mat-cell *matCellDef="let row">{{ row.fullName }}</td>
  </ng-container>

  <ng-container matColumnDef="role">
    <th mat-header-cell *matHeaderCellDef>Perfil</th>
    <td mat-cell *matCellDef="let row">{{ row.role }}</td>
  </ng-container>

  <ng-container matColumnDef="active">
    <th mat-header-cell *matHeaderCellDef>Ativo</th>
    <td mat-cell *matCellDef="let row">{{ row.active ? 'Sim' : 'Não' }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let row">
      <button mat-icon-button type="button" (click)="edit(row.id)" aria-label="Editar">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button type="button" (click)="remove(row)" aria-label="Excluir">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
