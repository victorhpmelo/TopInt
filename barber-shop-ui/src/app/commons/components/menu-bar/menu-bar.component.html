@if (auth.isLoggedIn()) {
  <div class="menu_container">
    <button mat-button class="nav-btn" [matMenuTriggerFor]="clientMenu">
      <div class="menu_title">Clientes</div>
    </button>
    <mat-menu #clientMenu="matMenu" yPosition="below">
      <button mat-menu-item (click)="navigateTo('clients/new-client')">Cadastro</button>
      <button mat-menu-item (click)="navigateTo('clients/list')">Listagem</button>
    </mat-menu>

    <button mat-button class="nav-btn" [matMenuTriggerFor]="scheduleMenu">
      <div class="menu_title">Agendar</div>
    </button>
    <mat-menu #scheduleMenu="matMenu" yPosition="below">
      <button mat-menu-item (click)="navigateTo('schedules/month')">Calendário</button>
    </mat-menu>

    @if (auth.isAdmin()) {
      <button mat-button class="nav-btn" [matMenuTriggerFor]="adminMenu">
        <div class="menu_title">Administração</div>
      </button>
      <mat-menu #adminMenu="matMenu" yPosition="below">
        <button mat-menu-item routerLink="/users">Usuários</button>
        <button mat-menu-item routerLink="/admin/backup">Backup</button>
      </mat-menu>
    }

    <button mat-button class="nav-btn nav-btn-logout" type="button" (click)="logout()">Sair</button>
  </div>
}
