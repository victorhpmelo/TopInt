spring.application.name=barber-shop-api

spring.datasource.url=${PGURL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.user=${PGUSER}
spring.flyway.password=${PGPASSWORD}
spring.flyway.outOfOrder=true
spring.flyway.clean-disabled=false

spring.servlet.multipart.max-file-size=64MB
spring.servlet.multipart.max-request-size=64MB

app.jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
app.jwt.expiration-ms=3600000

app.audit.log-file=logs/audit.log

app.backup.directory=./backups
app.backup.cron=0 0 2 * * *
app.backup.pg-dump-command=pg_dump
app.backup.psql-command=psql

server.ssl.enabled=false
